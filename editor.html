<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Abiball-Tischordnung</title>
    <link rel="stylesheet" href="./editor.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <div id="sidebar">
      <h2 style="margin: 0 10px;">Gäste</h2>
      <div id="guests_button_container">
        <button type="button" id="add_group_button"></button>
        <button type="button" id="add_person_button"></button>
      </div>
      <input type="text" id="search_input" placeholder="Gäste suchen..."/>
      <div id="guest_list"></div>
    </div>
    <div id="main">
      <h1>Abiball-Tischordnung</h1>
      <input type="file" id="import_guests_file" accept=".xlsx"/>
      <button type="button" id="import_guests_button">Gäste importieren</button> 
      <br>
      <input type="file" id="import_file" accept=".json"/>
      <button type="button" id="import_button">Layout importieren</button> 
      <button type="button" id="export_button">Layout exportieren</button> 
      <p></p>
      <button type="button" id="add_table_button"></button>
      <p></p>
      <div id="tables_container"></div>
    </div>
    <script src="editor.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  </body>
</html>
